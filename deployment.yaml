apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticket-cancellation-deployment
  labels:
    app: ticket-cancellation
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ticket-cancellation
  template:
    metadata:
      labels:
        app: ticket-cancellation
    spec:
      containers:
        - name: ticket-cancellation
          image: varshitha729479/ticket-cancellation:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: ticket-cancellation-service
spec:
  type: NodePort
  selector:
    app: ticket-cancellation
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: 30008